services:
  - type: web
    name: employee-management-app
    runtime: node
    plan: free
    buildCommand: npm run setup && npm run build
    startCommand: cd server && npx prisma db push && npm run seed && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: employee-management-db
          property: connectionString

databases:
  - name: employee-management-db
    plan: free
    databaseName: employee_management
    postgresMajorVersion: "16"
